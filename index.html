<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport"content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>OMW#01 オンラインくじ</title><style>body{font-family:'Helvetica Neue',Arial,sans-serif;background-color:white;text-align:center;padding:0;margin:0}.container{max-width:600px;margin:0 auto;background:white;padding:20px 15px;box-sizing:border-box}.kuji-logo{width:100%;max-width:540px;margin:0 auto 10px auto;display:flex;flex-direction:column;align-items:center;justify-content:center}.kuji-logo img{width:100%;height:auto;object-fit:contain;border-radius:10px}.kuji-logo-title{font-size:22px;font-weight:bold;color:#333;margin-top:15px;margin-bottom:10px}.select-wrapper{margin-bottom:15px}.count-select{padding:12px 20px;font-size:16px;font-weight:bold;border:2px solid#3742fa;color:#3742fa;border-radius:40px;width:100%;max-width:200px;text-align:center;background:white;cursor:pointer;outline:none}.buttons{margin-bottom:30px}button{background-color:white;color:#3742fa;border:2px solid#3742fa;padding:18px 20px;font-size:20px;font-weight:bold;border-radius:40px;cursor:pointer;margin:5px auto;box-shadow:0 4px 10px rgba(55,66,250,0.15);transition:all 0.2s ease;width:100%;box-sizing:border-box;display:block}button:hover{background-color:#3742fa;color:white}button:active{transform:scale(0.95)}button.ad-close-btn{background-color:#6c5ce7;color:white;border:none;box-shadow:0 4px 10px rgba(108,92,231,0.3)}button.ad-close-btn:hover{background-color:#5b4cc4;color:white}.history-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:0 5px}.history-title{font-weight:bold;color:#666;margin:0}.total-counter{font-size:14px;font-weight:bold;color:#3742fa;background:#e8f0fe;padding:4px 12px;border-radius:20px}.result-box{width:100%;min-height:100px;border:2px dashed#ccc;border-radius:10px;padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;background-color:#fafafa;box-sizing:border-box}.history-item{font-size:16px;color:#333;margin:5px 0}.disclaimer{font-size:11px;color:#999;margin-top:25px;line-height:1.5;border-top:1px dashed#eee;padding-top:15px}.scene{max-width:600px;margin:0 auto;min-height:100vh;padding:40px 20px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;background:white;position:relative;overflow:hidden}.bg-special-a{background:linear-gradient(135deg,#fff9c4 0%,#fff 50%,#ffe0b2 100%)!important}.tap-target{font-size:38px;font-weight:900;color:#222;cursor:pointer;user-select:none;letter-spacing:2px;animation:pulse 0.8s infinite alternate cubic-bezier(0.4,0,0.6,1);text-shadow:0 0 20px rgba(0,0,0,0.1);display:inline-block;transition:opacity 0.1s}.zoom-away{animation:zoomOutToIn 0.5s cubic-bezier(0.895,0.03,0.685,0.22)forwards!important}.prize-image{width:100%;max-width:340px;max-height:340px;margin:20px 0;border-radius:10px;object-fit:contain}.grade{font-size:44px;font-weight:bold;display:block;margin-bottom:5px}.prize-name{font-size:20px;color:#444;margin-bottom:15px}.special-a-text{color:#ff3f34;text-shadow:0 0 15px#ffd700,0 0 5px#ffd700;animation:superPop 0.6s cubic-bezier(0.175,0.885,0.32,1.275)}.ad-box{width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}.ad-title{font-size:14px;color:#aaa;margin-bottom:5px;letter-spacing:1px}.ad-image{width:100%;max-width:360px;height:auto;max-height:260px;border-radius:10px;margin-bottom:15px;box-shadow:0 4px 10px rgba(0,0,0,0.1);object-fit:contain}.ad-subtitle{font-size:13px;color:#888;margin-bottom:20px;font-weight:normal}.ad-disclaimer,.prize-disclaimer{font-size:10px;color:#bbb;margin-top:15px}.color-A{color:#ffd700}.color-B{color:#3742fa}.color-C{color:#2ed573}.color-D{color:#ffa502}.end-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background-color:#f7f7f7;box-sizing:border-box}.end-box{background:white;padding:40px 30px;border-radius:15px;box-shadow:0 4px 15px rgba(0,0,0,0.1);max-width:500px;width:100%;box-sizing:border-box}.end-message{font-size:18px;font-weight:bold;color:#555;line-height:1.6}@keyframes pulse{0%{transform:scale(0.96);opacity:0.6}100%{transform:scale(1.04);opacity:1}}@keyframes zoomOutToIn{0%{transform:scale(1);opacity:1;filter:blur(0px)}50%{filter:blur(2px)}100%{transform:scale(12);opacity:0;filter:blur(8px)}}@keyframes superPop{0%{transform:scale(0)rotate(-10deg);opacity:0}70%{transform:scale(1.2)rotate(5deg)}100%{transform:scale(1)rotate(0deg);opacity:1}}@media(min-width:601px){body{background-color:#f7f7f7;padding:20px}.container,.scene{border-radius:15px;box-shadow:0 4px 15px rgba(0,0,0,0.1);min-height:auto;margin-top:20px}button{max-width:400px}}</style></head><body><div id="mainView"class="container"><div class="kuji-logo"><img id="mainLogoImage"src=""alt="OMW #01 オンラインくじ"onerror="this.style.display='none';"><div class="kuji-logo-title">OMW#01 オンラインくじ</div></div><div class="select-wrapper"><select id="kujiCount"class="count-select"><option value="1">1回引く</option><option value="3">3回連続で引く</option><option value="5">5回連続で引く</option><option value="10">10回連続で引く</option></select></div><div class="buttons"><button id="drawBtn"onclick="startKuji()">くじを引く！</button></div><div class="history-header"><p class="history-title">【獲得履歴】</p><span id="totalCounter"class="total-counter">合計:0回(0円)</span></div><div class="result-box"id="resultBox"><p style="color: #999;">ボタンを押してくじを引こう！</p></div><div class="disclaimer">※当ページは個人が楽しむために制作した非公式のファンアート作品です。<br>※使用しているキャラクターの著作権および一切の権利は、原作者様・公式元に帰属します。<br>※実在の企業、公式グッズ、およびくじ興行とは一切関係ありません。</div></div><div id="sceneView"class="scene"style="display: none;"></div><div id="endView"class="end-screen"style="display: none;"><div class="end-box"><p class="end-message"id="endMessageField">🚨🚨🚨<br><br>このオンラインくじシミュレーターの<br>公開期間は終了しました。<br><br>たくさん遊んでいただき、<br>本当にありがとうございました！✨</p></div></div><script>document.addEventListener('contextmenu',(e)=>{e.preventDefault()});document.addEventListener('copy',(e)=>{e.preventDefault()});document.addEventListener('keydown',(e)=>{if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'||e.key==='C'))){e.preventDefault()}});const END_DATE=new Date(2026,6,26,23,59,59);const ALLOWED_DOMAIN='sirosiroingn.github.io';const checkSecurityOnLoad=()=>{const now=new Date();const currentHost=window.location.hostname;const realLimit=1785125999000;if(now.getTime()>realLimit||now>END_DATE){showLockScreen('🚨 公開期間が終了しました。<br>遊んでいただきありがとうございました！');return true}if(currentHost&&currentHost!=='localhost'&&currentHost!=='127.0.0.1'&&currentHost!==ALLOWED_DOMAIN){showLockScreen('🚨 エラー: このファイルは許可されていない場所で実行されています。<br>二次配布・無断コピーは禁止されています。');return true}return false};function showLockScreen(message){document.getElementById('mainView').style.removeProperty('display');document.getElementById('mainView').style.display='none';document.getElementById('sceneView').style.display='none';document.getElementById('endView').style.display='flex';document.getElementById('endMessageField').innerHTML=message}const isSecurityLocked=checkSecurityOnLoad();const kujiLogoUrl='logo.png';const adBannerUrl='ad.png';const prizes=[{grade:'A賞',name:'タペストリー',weight:6,colorClass:'color-A',images:{default:'prize_a.png'}},{grade:'B賞',name:'アクリルフィギュア',weight:18,colorClass:'color-B',subItems:['A','B'],images:{'A':'prize_b_a.png','B':'prize_b_b.png'}},{grade:'C賞',name:'クリアファイル&ステッカーセット',weight:10,colorClass:'color-C',images:{default:'prize_c.png'}},{grade:'D賞',name:'ランダム缶バッジ',weight:66,colorClass:'color-D',subItems:['A','B','C','D','E','F'],images:{'A':'prize_d_a.png','B':'prize_d_b.png','C':'prize_d_c.png','D':'prize_d_d.png','E':'prize_d_e.png','F':'prize_d_f.png'}}];if(!isSecurityLocked){document.getElementById('mainLogoImage').src=kujiLogoUrl}const PRICE_PER_KUJI=333;let totalDrawCount=0;let currentLotteryQueue=[];let currentDisplayIndex=0;function startKuji(){if(checkSecurityOnLoad())return;const countSelect=document.getElementById('kujiCount');const drawCount=parseInt(countSelect.value,10);currentLotteryQueue=[];for(let i=0;i<drawCount;i++){currentLotteryQueue.push(getFinalPrizeResult())}currentDisplayIndex=0;document.getElementById('mainView').style.display='none';setupNextTapScreen()}function setupNextTapScreen(){const scene=document.getElementById('sceneView');scene.style.display='flex';scene.className='scene';const total=currentLotteryQueue.length;const currentNum=currentDisplayIndex+1;const counterText=total>1?`<div style="font-size:16px; color:#666; margin-bottom:15px; font-weight:bold;">${currentNum} / ${total}枚目</div>`:'';scene.innerHTML=`${counterText}<div class="tap-target" onclick="revealPrize(this)">TAP TO OPEN</div>`}function revealPrize(element){element.onclick=null;element.classList.add('zoom-away');setTimeout(()=>{const scene=document.getElementById('sceneView');const prize=currentLotteryQueue[currentDisplayIndex];let gradeClass=prize.colorClass;if(prize.grade==='A賞'){gradeClass+=' special-a-text';scene.classList.add('bg-special-a')}const isLast=currentDisplayIndex===currentLotteryQueue.length-1;const buttonText=isLast?'戻る':'次へ';const clickAction=isLast?'clickReturnButton()':'nextPrize()';scene.innerHTML=`<span class="grade ${gradeClass}">${prize.grade}</span><p class="prize-name">${prize.displayName}</p><img src="${prize.finalImage}" alt="${prize.displayName}" class="prize-image" onerror="this.src='https://via.placeholder.com/150?text=No+Image'"><br><button onclick="${clickAction}">${buttonText}</button><p class="prize-disclaimer">※この景品はフィクションです。</p>`;addHistory(prize);updateTotalCounter();currentDisplayIndex++},400)}function nextPrize(){const scene=document.getElementById('sceneView');scene.className='scene';setupNextTapScreen()}function getFinalPrizeResult(){const basePrize=getRandomPrize();const finalPrize={...basePrize};if(finalPrize.subItems){const randomIndex=Math.floor(Math.random()*finalPrize.subItems.length);const chosenSub=finalPrize.subItems[randomIndex];if(finalPrize.grade==='B賞'){finalPrize.displayName=`${finalPrize.name}（全2種） [タイプ${chosenSub}]`;finalPrize.finalImage=finalPrize.images[chosenSub]}else if(finalPrize.grade==='D賞'){finalPrize.displayName=`${finalPrize.name}（全6種） [タイプ${chosenSub}]`;finalPrize.finalImage=finalPrize.images[chosenSub]}}else{finalPrize.displayName=finalPrize.name;finalPrize.finalImage=finalPrize.images.default}return finalPrize}function clickReturnButton(){if(Math.random()<0.09){showAdPage()}else{closeScene()}}function showAdPage(){const scene=document.getElementById('sceneView');scene.className='scene';scene.innerHTML=`<div class="ad-box"><p class="ad-title">スポンサー広告</p><img src="${adBannerUrl}" alt="お知らせ" class="ad-image" onerror="this.src='https://via.placeholder.com/300x150?text=AD+Image+Missing'"><p class="ad-subtitle">＼ ここだけの限定最新情報！ ／</p><button class="ad-close-btn" onclick="closeScene()">広告を閉じて戻る</button><p class="ad-disclaimer">※この広告はフィクションです。</p></div>`}function closeScene(){document.getElementById('sceneView').style.display='none';document.getElementById('mainView').style.display='block'}function addHistory(prize){const resultBox=document.getElementById('resultBox');if(resultBox.querySelector('p[style*="#999"]')){resultBox.innerHTML=''}const p=document.createElement('p');p.className='history-item';p.innerHTML=`<span class="${prize.colorClass}" style="font-weight:bold;">${prize.grade}</span>：${prize.displayName}`;resultBox.insertBefore(p,resultBox.firstChild)}function updateTotalCounter(){totalDrawCount++;const totalMoney=totalDrawCount*PRICE_PER_KUJI;const formattedMoney=totalMoney.toLocaleString();document.getElementById('totalCounter').innerText=`合計: ${totalDrawCount}回 (${formattedMoney}円)`}function getRandomPrize(){const totalWeight=prizes.reduce((sum,prize)=>sum+prize.weight,0);let random=Math.floor(Math.random()*totalWeight);for(const prize of prizes){if(random<prize.weight)return prize;random-=prize.weight}}</script></body></html>
